server:
  port: 8081

spring:
  application:
    name: chenxu-demo
  cloud:
    nacos:
      config:
        server-addr: 192.168.249.129:8848
        namespace: 589e3087-3772-45e7-95a0-6130a8a038f3
        group: DEFAULT_GROUP
        file-extension: yaml
      discovery:
        server-addr: 192.168.249.129:8848
        namespace: 589e3087-3772-45e7-95a0-6130a8a038f3
        group: DEFAULT_GROUP
    # ========== Sentinel 熔断限流配置 ==========
    sentinel:
      transport:
        dashboard: 192.168.249.129:8858   # Sentinel Dashboard 控制台地址
        port: 8719                         # 客户端通信端口（Dashboard 向此端口推送规则）
      eager: true                          # 启动即初始化，默认懒加载
  config:
    import:
      - optional:nacos:chenxu-demo.yaml
  kafka:
    bootstrap-servers: 192.168.249.129:9092
    consumer:
      group-id: cx-hash-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 10
        max.in.flight.requests.per.connection: 5
        batch.size: 16384
        linger.ms: 5
        request.timeout.ms: 30000
        metadata.max.age.ms: 300000
  data:
    redis:
      port: 6379
      password: snCJadmin-1
      host: 192.168.249.129
      database: 0
      timeout: 5000
  datasource:
    url: jdbc:mysql://192.168.249.129:3306/austin?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: snCJadmin-1
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: org.example.redis.load

kafka:
  topic: HASH_PAR_CX
  partitions: 3
