# ============================================
# chenxu-vue: Deployment + NodePort Service
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chenxu-vue
  namespace: chenxu
  labels:
    app: chenxu-vue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chenxu-vue
  template:
    metadata:
      labels:
        app: chenxu-vue
    spec:
      containers:
        - name: chenxu-vue
          image: chenxu-vue:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: chenxu-vue
  namespace: chenxu
  labels:
    app: chenxu-vue
spec:
  type: NodePort
  selector:
    app: chenxu-vue
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31080
      protocol: TCP
