# ============================================
# chenxu-demo: Deployment + ClusterIP Service
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chenxu-demo
  namespace: chenxu
  labels:
    app: chenxu-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chenxu-demo
  template:
    metadata:
      labels:
        app: chenxu-demo
    spec:
      containers:
        - name: chenxu-demo
          image: chenxu-demo:latest
          imagePullPolicy: IfNotPresent   # 本地构建，kind load 加载
          ports:
            - containerPort: 8081
              protocol: TCP
          env:
            # ---- Nacos ----
            - name: SPRING_CLOUD_NACOS_CONFIG_SERVER-ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_SERVER_ADDR
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NACOS_SERVER_ADDR
            # ---- MySQL ----
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://$(MYSQL_HOST):$(MYSQL_PORT)/$(MYSQL_DATABASE)?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MYSQL_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MYSQL_PASSWORD
            # ---- Redis ----
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: REDIS_PASSWORD
            # ---- Kafka ----
            - name: SPRING_KAFKA_BOOTSTRAP-SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
          envFrom:
            - configMapRef:
                name: app-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: chenxu-demo
  namespace: chenxu
  labels:
    app: chenxu-demo
spec:
  type: ClusterIP
  selector:
    app: chenxu-demo
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
