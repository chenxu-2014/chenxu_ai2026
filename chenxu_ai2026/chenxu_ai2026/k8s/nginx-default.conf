# ============================================
# nginx 配置 — Vue 前端 + API 代理
# K8s 中 gateway Service 的 DNS: chenxu-gateway.chenxu.svc.cluster.local
# ============================================
server {
    listen       80;
    server_name  localhost;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Vue 静态资源
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA 路由: 所有非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 请求代理到 K8s Gateway Service
    # 路径匹配与 vite.config.ts 中的 proxy 保持一致
    location ~ ^/(auth|meter|compare|kafka|sendOrdered|redis|sentinel|order|api) {
        proxy_pass http://chenxu-gateway.chenxu.svc.cluster.local:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # 错误页面
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
